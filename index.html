<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<style>
:root{--p:#2563eb;--bg:#fff;--t:#202124;--g:#f1f3f4;--s:cubic-bezier(.2,.8,.2,1)}
@media(prefers-color-scheme:dark){:root{--bg:#121212;--t:#e8eaed;--g:#202124}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--t);overflow:hidden;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
.btn{background:var(--p);color:#fff;border:none;padding:10px 24px;border-radius:12px;font-weight:600;cursor:pointer;transition:transform .2s var(--s),filter .2s;display:inline-flex;align-items:center;gap:8px}
.btn:active{transform:scale(.95);filter:brightness(.9)}
.glass{background:rgba(255,255,255,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
@media(prefers-color-scheme:dark){.glass{background:rgba(18,18,18,.8)}}
.tbar{position:fixed;top:0;width:100%;height:64px;display:flex;align-items:center;padding:0 16px;z-index:99;box-shadow:0 1px 10px rgba(0,0,0,.05)}
.logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:800;color:var(--p);letter-spacing:-.5px}
.sbox{flex:1;margin:0 16px;background:var(--g);border-radius:20px;padding:8px 16px;display:flex;align-items:center;gap:10px;transition:all .3s var(--s)}
.sbox:focus-within{box-shadow:0 0 0 2px var(--p)}
.sbox input{border:none;background:0 0;outline:0;width:100%;font-size:15px;color:var(--t)}
.p-ic{width:36px;height:36px;border-radius:50%;background:var(--g);cursor:pointer;object-fit:cover;border:2px solid transparent;transition:border .3s}
.p-ic:active{border-color:var(--p)}
.navb{position:fixed;bottom:0;width:100%;height:64px;border-top:1px solid rgba(128,128,128,.1);display:flex;justify-content:space-around;align-items:center;z-index:99;padding-bottom:env(safe-area-inset-bottom)}
.nitem{display:flex;flex-direction:column;align-items:center;color:#80868b;font-size:11px;font-weight:600;cursor:pointer;gap:4px;transition:color .3s var(--s),transform .3s var(--s)}
.nitem i{font-size:20px;transition:transform .3s var(--s)}
.nitem.act{color:var(--p)}
.nitem.act i{transform:translateY(-2px) scale(1.1)}
.main{margin-top:64px;height:calc(100vh - 128px);overflow-y:auto;padding:16px;scroll-behavior:smooth}
.sec{margin-bottom:24px}
.s-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:700;font-size:18px}
.hz-scr{display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory}
.hz-scr .crd{min-width:110px;scroll-snap-align:start}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:16px}
.crd{display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:transform .2s var(--s),opacity .3s}
.crd:active{transform:scale(.92)}
.crd img{width:100%;aspect-ratio:1;border-radius:22%;object-fit:cover;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.c-t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-s{font-size:11px;color:#80868b;display:flex;align-items:center;gap:4px}
.rk-bdg{position:absolute;top:-6px;left:-6px;background:var(--p);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;box-shadow:0 2px 6px rgba(0,0,0,.2);z-index:2}
.crd-w{position:relative}
#dv,#mod,#ai-mod{position:fixed;inset:0;background:var(--bg);z-index:1000;transform:translateY(100%);transition:transform .4s var(--s),opacity .4s var(--s);display:flex;flex-direction:column;opacity:0}
#dv.show,#mod.show,#ai-mod.show{transform:translateY(0);opacity:1}
.d-hdr{height:64px;display:flex;align-items:center;padding:0 16px;gap:16px;position:sticky;top:0;z-index:10}
.d-hdr i{font-size:22px;cursor:pointer;padding:8px}
.d-cont{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px}
.d-top{display:flex;gap:20px;align-items:center;margin-bottom:16px}
.d-icon{width:100px;height:100px;border-radius:24%;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.d-ti{font-size:24px;font-weight:800;line-height:1.2}
.d-dev{color:var(--p);font-size:14px;font-weight:600;margin:6px 0;display:flex;align-items:center;gap:4px}
.d-act{display:flex;gap:12px;margin-top:16px}
.d-scr{display:flex;gap:12px;overflow-x:auto;margin:24px 0;padding-bottom:12px;scroll-snap-type:x mandatory}
.d-scr img{height:220px;border-radius:12px;scroll-snap-align:center;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.d-desc{font-size:14px;line-height:1.6;color:var(--t);opacity:.9}
.d-stats{display:flex;justify-content:space-around;margin:16px 0;padding:16px 0;border-top:1px solid rgba(128,128,128,.1);border-bottom:1px solid rgba(128,128,128,.1)}
.stat-i{display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-v{font-weight:800;font-size:16px;color:var(--t)}
.stat-l{font-size:11px;color:#80868b;text-transform:uppercase;font-weight:600}
.d-tags{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.tg{background:var(--g);padding:6px 12px;border-radius:16px;font-size:12px;font-weight:600;color:var(--t)}
.v-bdg{color:#10b981;font-size:14px}
.ex-inf{background:var(--g);border-radius:16px;padding:16px;font-size:13px;color:var(--t);margin-top:24px;display:flex;flex-direction:column;gap:8px}
#plyr{position:fixed;inset:0;z-index:9999;background:#000;display:none;width:100%;height:100%;border:none;transform:scale(.95);opacity:0;transition:all .4s var(--s)}
#plyr.play{transform:scale(1);opacity:1}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#323232;color:#fff;padding:12px 24px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .3s var(--s);z-index:99999;pointer-events:none;white-space:nowrap}
.toast.st{transform:translateX(-50%) translateY(0);opacity:1}
.inp-g{margin-bottom:16px}.inp-g label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:#80868b}.inp-g input{width:100%;padding:12px;border:2px solid var(--g);border-radius:12px;background:var(--bg);color:var(--t);font-size:16px;transition:border .3s;outline:0}.inp-g input:focus{border-color:var(--p)}
.ai-g{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24px 0}
.ai-g img{width:100%;aspect-ratio:1;border-radius:50%;object-fit:cover;cursor:pointer;border:3px solid transparent;transition:all .2s;opacity:0;transform:scale(.8)}
.ai-g img.show{opacity:1;transform:scale(1)}.ai-g img.sel{border-color:var(--p);transform:scale(1.1)}
.ldr{position:fixed;inset:0;background:var(--bg);z-index:999999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity .4s}.sp{width:40px;height:40px;border:4px solid var(--g);border-top:4px solid var(--p);border-radius:50%;animation:sp 1s cubic-bezier(.5,0,.5,1) infinite}@keyframes sp{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<script>
let db=[],cApp=null,cC='games',sz=6,u={p:[],r:[],n:'Guest',t:'Player',a:'https://placehold.co/100/2563eb/fff?text=U'};let aiA=['1.png','2.png','3.png','4.png','5.png','6.png','7.png','8.png','9.png'],aiI=0,cAiS='';const $=(i)=>document.getElementById(i),vp=navigator.vibrate||function(){};window.onload=async()=>{try{let ls=localStorage.getItem('kbs_u');if(ls)u=JSON.parse(ls);rU()}catch(e){}let t=setTimeout(()=>{$('ldr-msg').style.display='inline-flex';$('sp-ldr').style.display='none'},8000);try{let c=new AbortController(),i=setTimeout(()=>c.abort(),8000),r=await fetch('data.json',{signal:c.signal});clearTimeout(i);if(!r.ok)throw new Error();let d=await r.json();db=d.items;sw('games',$('.nitem'));clearTimeout(t);let l=$('ldr');l.style.opacity='0';setTimeout(()=>l.style.display='none',400)}catch(e){db=[]}};function rU(){$('u-ic').src=u.a;$('pf-ic').src=u.a;$('u-tag').value=u.t;$('u-nm').value=u.n;let fDb=db.length?db:[];if(u.p.length){$('pn-g').innerHTML=u.p.map(id=>{let x=fDb.find(z=>z.id===id);return x?cG(x):''}).join('');$('u-sec').style.display='block'}if(u.r.length){$('rc-g').innerHTML=u.r.map(id=>{let x=fDb.find(z=>z.id===id);return x?cG(x):''}).join('');$('u-sec').style.display='block'}}function tst(m){let t=$('toast');t.innerText=m;t.classList.add('st');vp(50);setTimeout(()=>t.classList.remove('st'),2500)}function cG(i,rk=0){return `<div class="crd-w"><div class="crd" onclick="oDv('${i.id}')">${rk>0?`<div class="rk-bdg">${rk}</div>`:''}<img src="${i.icon}" loading="lazy" decoding="async"><div class="c-t">${i.title}</div><div class="c-s">${i.size} ★ ${i.rate}</div></div></div>`}function sw(c,el){cC=c;sz=6;document.querySelectorAll('.nitem').forEach(x=>x.classList.remove('act'));el.classList&&el.classList.add('act');$('c-ti').innerText=`All ${c.charAt(0).toUpperCase()+c.slice(1)}`;let f=db.filter(x=>x.cat===c);$('tp-g').innerHTML=f.slice(0,10).map((x,i)=>cG(x,i+1)).join('');$('grd').innerHTML=f.slice(0,sz).map(x=>cG(x)).join('');rU();$('mn').scrollTo(0,0)}function oDv(id){cApp=db.find(x=>x.id===id);if(!cApp)return;vp(10);$('d-ic').src=cApp.icon;$('d-t').innerText=cApp.title;$('d-d').innerHTML=`${cApp.dev}${cApp.verified?' <i class="fa-solid fa-circle-check v-bdg" title="Verified"></i>':''}`;$('d-s').innerHTML=`${cApp.size} • v${cApp.ver}`;$('d-stats').innerHTML=`<div class="stat-i"><span class="stat-v">${cApp.rate} <i class="fa-solid fa-star" style="font-size:12px;color:#f59e0b"></i></span><span class="stat-l">${cApp.rateCount||'0'} Revs</span></div><div class="stat-i"><span class="stat-v">${cApp.downloads||'0'}</span><span class="stat-l">Downloads</span></div><div class="stat-i"><span class="stat-v">${cApp.age||'3+'}</span><span class="stat-l">Rated</span></div><div class="stat-i"><span class="stat-v">#${cApp.rank||'-'}</span><span class="stat-l">${(cApp.cat||'App').toUpperCase()}</span></div>`;$('d-tags').innerHTML=(cApp.tags||[]).map(t=>`<span class="tg">${t}</span>`).join('')+(cApp.featured?'<span class="tg" style="background:#f59e0b;color:#fff">Featured</span>':'')+(cApp.trending?'<span class="tg" style="background:#ff3b30;color:#fff">Trending</span>':'');$('d-desc').innerText=cApp.desc;$('d-ex').innerHTML=`<div style="font-weight:800;margin-bottom:4px;font-size:15px">App Info</div><div><i class="fa-solid fa-calendar-check" style="width:20px;color:#80868b"></i> Updated: ${cApp.updated||'-'}</div><div><i class="fa-solid fa-box" style="width:20px;color:#80868b"></i> Package: ${cApp.pkg||'-'}</div><div><i class="fa-solid fa-file-arrow-down" style="width:20px;color:#80868b"></i> Update Size: ${cApp.updateSize||cApp.size}</div>`;$('d-sc').innerHTML=cApp.img.map(m=>`<img src="${m}" loading="lazy">`).join('');let b=$('d-b');if(cApp.type==='ks'){b.innerHTML='<i class="fa-solid fa-play"></i> Play';b.onclick=()=>pKs(cApp)}else{b.innerHTML='<i class="fa-solid fa-download"></i> Download';b.onclick=()=>window.open(cApp.link,'_blank')}$('p-btn').style.color=u.p.includes(id)?'var(--p)':'#80868b';$('dv').classList.add('show');history.pushState({p:'dv'},"")}function cDv(){$('dv').classList.remove('show');cApp=null}function tPin(){if(!cApp)return;let i=u.p.indexOf(cApp.id);if(i>-1){u.p.splice(i,1);$('p-btn').style.color='#80868b';tst('Unpinned')}else{if(u.p.length>=10){tst('Max 10 pins allowed');return}u.p.unshift(cApp.id);$('p-btn').style.color='var(--p)';tst('Pinned')}svU();vp(20)}function svU(){localStorage.setItem('kbs_u',JSON.stringify(u));rU()}function pKs(a){try{u.r=u.r.filter(x=>x!==a.id);u.r.unshift(a.id);if(u.r.length>10)u.r.pop();svU();let r=a.ksData.replace('[KBIOS-ENGINE-V1]\n','');let d=CryptoJS.AES.decrypt(r,'KBIOS_SECURE_KEY_2026').toString(CryptoJS.enc.Utf8);let o=JSON.parse(d);let f=$('plyr');f.style.display='block';setTimeout(()=>f.classList.add('play'),50);if(f.requestFullscreen)f.requestFullscreen();let b=new Blob([`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><style>${o.c}</style></head><body>${o.h}<script>${o.j}<\/script></body></html>`],{type:'text/html'});f.src=URL.createObjectURL(b);history.pushState({p:'ply'},"")}catch(e){tst("Failed to launch KBIOS Engine")}}function xPly(){let f=$('plyr');f.classList.remove('play');setTimeout(()=>{f.style.display='none';f.src=''},400);if(document.fullscreenElement)document.exitFullscreen()}window.onpopstate=e=>{if($('plyr').classList.contains('play'))xPly();else if($('ai-mod').classList.contains('show'))cAi();else if($('mod').classList.contains('show'))cMod();else cDv()};$('sinp').addEventListener('input',e=>{let v=e.target.value.toLowerCase();if(!v)sw(cC,document.querySelector('.nitem.act'));else{$('grd').innerHTML=db.filter(x=>x.title.toLowerCase().includes(v)||x.dev.toLowerCase().includes(v)).map(x=>cG(x)).join('')}});function shApp(){if(navigator.share&&cApp)navigator.share({title:cApp.title,text:cApp.desc,url:window.location.href})}function oMod(){$('mod').classList.add('show');history.pushState({p:'mod'},"")}function cMod(){$('mod').classList.remove('show')}function sUsr(){u.t=$('u-tag').value;u.n=$('u-nm').value;let oBtn=event.currentTarget;let oH=oBtn.innerHTML;oBtn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Saving...';setTimeout(()=>{svU();oBtn.innerHTML=oH;tst('Profile Saved');cMod()},800)}function oAi(){$('ai-mod').classList.add('show');history.pushState({p:'ai'},"");gAi()}function cAi(){$('ai-mod').classList.remove('show')}function gAi(){$('ai-st').innerText='Generating with Nat Pro Nano...';$('ai-grd').innerHTML='';$('ai-sv').style.display='none';cAiS='';let rA=[];for(let i=0;i<3;i++){rA.push(aiA[aiI]);aiI++;if(aiI>=aiA.length)aiI=0}setTimeout(()=>{$('ai-st').innerText='Select your unique avatar';$('ai-grd').innerHTML=rA.map((x,i)=>`<img src="${x}" onclick="slAi(this,'${x}')" style="transition-delay:${i*0.1}s">`).join('');setTimeout(()=>document.querySelectorAll('.ai-g img').forEach(el=>el.classList.add('show')),50)},1000)}function slAi(el,x){document.querySelectorAll('.ai-g img').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');cAiS=x;$('ai-sv').style.display='inline-flex';vp(10)}function sAi(){if(!cAiS)return;let oBtn=$('ai-sv');oBtn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Applying...';setTimeout(()=>{u.a=cAiS;$('pf-ic').src=cAiS;svU();oBtn.innerHTML='<i class="fa-solid fa-check"></i> Apply Selected';cAi();tst('Avatar Updated')},800)}$('mn').addEventListener('scroll',e=>{if($('sinp').value)return;let el=e.target;if(el.scrollHeight-el.scrollTop<=el.clientHeight+100&&sz<db.length){sz+=6;let f=db.filter(x=>x.cat===cC);$('grd').innerHTML=f.slice(0,sz).map(x=>cG(x)).join('')}});
</script>
